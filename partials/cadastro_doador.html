<div class="alert alert-primary text-center" role="alert">
    CADASTRO DE DOADOR
</div>

<div class="row g-2">
	<fieldset class="col-md-8">
        <label for="text-doador-nome" class="form-label mb-0">Nome completo:</label>			
        <input id="text-doador-nome" type="text" class="form-control form-control-sm infoco" placeholder="Digite seu nome completo">
    </fieldset>

	<fieldset class="col-md-4">
        <label for="text-doador-login" class="form-label mb-0">Login:</label>
        <input id="text-doador-login" type="text" class="form-control form-control-sm" placeholder="Crie um nome para acesso ao app">
    </fieldset>

    <fieldset class="col-md-4">
        <label for="text-doador-senha" class="form-label mb-0">Senha:</label>
        <input type="password" id="text-doador-senha" class="form-control form-control-sm" placeholder="Crie sua senha">
    </fieldset>    
    
    <fieldset class="col-md-4">
        <label for="text-confirmar-senha" class="form-label mb-0">Confirmar senha:</label>
        <input type="password" id="text-confirmar-senha" class="form-control form-control-sm" placeholder="Confirme sua senha">
    </fieldset>    

	<fieldset class="col-md-4">
        <label for="text-doador-profissao" class="form-label mb-0">Profissão:</label>
        <input id="text-doador-profissao" type="text" class="form-control form-control-sm">
    </fieldset>

	<fieldset class="col-md-4">
        <label for="text-doador-contato" class="form-label mb-0">Contato (opcional):</label>
        <input id="text-doador-contato" type="text" class="form-control form-control-sm">
    </fieldset>

    <fieldset class="col-md-4">
        <button id="botao-doador-salvar" class="form-control btn btn-primary mt-3">Salvar</button>
    </fieldset>
</div>
